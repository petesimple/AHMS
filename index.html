<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Air Hockey Match Sheet</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1b1b1b">
  <script src="http://192.168.1.19/cgi-bin/epos-2.0.0.js"></script>

  <style>
    .gear-panel {
      max-width: 420px;
      margin: 12px auto;
      background: #222;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 8px 12px;
      color: #fff;
    }

    .gear-panel summary {
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: bold;
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .gear-panel summary::-webkit-details-marker {
      display: none;
    }

    .gear-panel summary::after {
      content: "⚙️";
      font-size: 1.2rem;
    }

    .gear-content {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .gear-note {
      font-size: 0.9rem;
      line-height: 1.35;
      background: #111;
      border-left: 4px solid #f5c542;
      padding: 8px 10px;
      border-radius: 6px;
      color: #f5f5f5;
    }

    .gear-buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .gear-buttons button {
      width: 100%;
    }
  </style>
</head>

<body>
  <img src="AHMSlogo.png" alt="Air Hockey Match Sheet Logo" style="max-width: 200px; display: block; margin: 0 auto 10px;" />

  <form id="matchForm">
    <label>Table #<input type="text" id="tableNum"></label>
    <label>Referee<input type="text" id="refName"></label>
    <label>Player A<input type="text" id="playerA" required></label>
    <label>Player B<input type="text" id="playerB" required></label>

    <details class="gear-panel">
      <summary>Settings</summary>

      <div class="gear-content">
        <label>Match #<input type="number" id="matchNum"></label>

        <div class="gear-note">
          Logo changes apply after generating a new match card. If you update or clear the logo, generate the match card again before printing.
        </div>

        <div class="gear-buttons">
          <button id="printBlankBtn" type="button">
            Print a Blank Card
          </button>

          <button id="printPhotonBtn" type="button">
            Photon Doubles Sheet
          </button>

          <button id="printRankMatchBtn" type="button">
            Print Rank Match
          </button>
        </div>
      </div>
    </details>

    <button type="submit">Generate Sheet</button>
  </form>

  <div id="output" class="sheet hidden"></div>

  <button id="printBtn" class="hidden">🖨️ Print to Epson</button>
  <button id="printBrowserBtn" class="hidden">🖨️ Print to Browser</button>

  <button id="downloadBtn" class="hidden">📄 Download as .txt</button>

  <script src="script.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js")
        .then(reg => console.log("Service Worker Registered"))
        .catch(err => console.error("Service Worker Registration Failed", err));
    }
  </script>
</body>
</html>
